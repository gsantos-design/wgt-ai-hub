<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wealth Growth Tracker • AI Hub</title>
  <link rel="stylesheet" href="./styles.css" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="dot"></div>
        <div>
          <div class="title">Wealth Growth Tracker • AI Hub</div>
          <div class="small">Realtime Gemini chat • TTS • Lead capture</div>
        </div>
      </div>
      <div id="statusBadge" class="status">Checking…</div>
    </div>

    <div class="grid">
      <!-- Left: Chat -->
      <div class="card">
        <div class="head">
          <div>Assistant</div>
          <div class="small">Powered by Google Gemini</div>
        </div>
        <div class="body stack">
          <div id="chatLog" class="chat-log"></div>
          <form id="chatForm" class="row">
            <input id="chatInput" class="input" placeholder="Ask anything…" />
            <button class="btn">Send</button>
          </form>
        </div>
      </div>

      <!-- Right: TTS + Lead -->
      <div class="card">
        <div class="head">
          <div>Voice & Leads</div>
          <div class="small">TTS playback and lead capture</div>
        </div>
        <div class="body stack">
          <div class="row">
            <input id="ttsText" class="input" placeholder="Text to speak…" />
            <button id="ttsBtn" class="btn secondary" type="button">Speak</button>
          </div>
          <audio id="ttsAudio" controls></audio>

          <hr style="border-color: rgba(255,255,255,.08); border-width:1px; width:100%;" />

          <form id="leadForm" class="lead">
            <input name="name" class="input" placeholder="Full name" required />
            <input name="email" class="input" placeholder="Email" type="email" required />
            <textarea name="message" class="input" placeholder="How can we help?" rows="4"></textarea>
            <button class="btn" type="submit">Send</button>
            <div id="leadNote" class="note"></div>
          </form>
        </div>
      </div>
    </div>

    <footer>© Wealth Growth Tracker • Built for clients, not for demos.</footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
